name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shell-and-unicode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check (every .sh file)
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            if ! bash -n "$f"; then
              echo "syntax error: $f"
              fail=1
            fi
          done < <(find . -path ./.git -prune -o -type f -name '*.sh' -print0)
          exit "$fail"

      - name: ShellCheck
        # Pinned to the v2.0.0 release SHA. This repo's whole point is
        # making AI-assisted dev safer; mutable @master refs are exactly
        # the supply-chain shape we don't want here.
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        with:
          severity: warning
          scandir: '.'
          ignore_paths: .git

      - name: Hidden Unicode scan
        run: python3 scripts/check-hidden-unicode.py

      - name: claim-fork.sh smoke test (--help)
        run: ./claim-fork.sh --help

      - name: claim-fork.sh smoke test (--dry-run on simulated fork)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          # Mirror the repo into a tmp dir, retarget origin to a fake fork,
          # and confirm claim-fork.sh detects it and previews cleanly.
          cp -R . "$tmp/repo"
          cd "$tmp/repo"
          rm -rf .git
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          git remote add origin https://github.com/ci-fork-test/ai-rules-fork.git
          git add . >/dev/null
          git commit -q -m "init"
          # Accept all parsed defaults via empty newlines; --dry-run exits
          # before any mutation, so this should always succeed.
          printf '\n\n\n' | ./claim-fork.sh --dry-run

      - name: setup.sh smoke test (--help, --list)
        run: |
          set -euo pipefail
          # Capture output first, then grep — avoids SIGPIPE on setup.sh's
          # printf loop when `grep -q` exits early on the first match
          # (combined with pipefail, that would propagate non-zero).
          help_out=$(./setup.sh --help)
          echo "$help_out" | grep -q "Usage:"
          echo "$help_out" | grep -q -- "--force"
          echo "$help_out" | grep -q -- "--check"
          echo "$help_out" | grep -qE "Defaults to:.*claude,copilot"
          list_out=$(./setup.sh --list)
          echo "$list_out" | grep -q "claude"
          echo "$list_out" | grep -q "copilot"
          echo "$list_out" | grep -q "cursor"

      - name: setup.sh smoke test (no-args defaults to claude,copilot)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          out=$("$tmp/.ai-rules/setup.sh" --dry-run 2>&1)
          echo "$out" | grep -q "defaulting to: claude,copilot"
          echo "$out" | grep -q "would create CLAUDE.md"
          echo "$out" | grep -q "would create .github/copilot-instructions.md"
          # Dry-run must not have created either file
          [[ ! -e "$tmp/CLAUDE.md" ]]
          [[ ! -e "$tmp/.github/copilot-instructions.md" ]]

      - name: setup.sh smoke test (--force overwrites existing stub)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          mkdir -p .cursor/rules
          {
            echo '<!-- ai-rules-reference -->'
            echo 'do not overwrite without --force'
          } > .cursor/rules/ai-rules.mdc
          # Without --force: skip existing
          out=$("$tmp/.ai-rules/setup.sh" --platforms cursor 2>&1)
          echo "$out" | grep -q "already has ai-rules reference"
          grep -q "do not overwrite without --force" .cursor/rules/ai-rules.mdc
          # With --force: overwrite with template
          "$tmp/.ai-rules/setup.sh" --platforms cursor --force >/dev/null
          grep -q "alwaysApply: true" .cursor/rules/ai-rules.mdc

      - name: setup.sh smoke test (--force --dry-run does not write)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          mkdir -p .cursor/rules
          echo "manual content do not touch" > .cursor/rules/ai-rules.mdc
          out=$("$tmp/.ai-rules/setup.sh" --platforms cursor --force --dry-run 2>&1)
          echo "$out" | grep -q "would overwrite"
          # File unchanged
          grep -q "manual content do not touch" .cursor/rules/ai-rules.mdc

      - name: setup.sh smoke test (non-regular target file is guarded)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          # Target is a directory, not a regular file
          mkdir CLAUDE.md
          out=$("$tmp/.ai-rules/setup.sh" --platforms claude 2>&1)
          echo "$out" | grep -q "not a regular file"
          # Even with --force, the guard must hold
          out=$("$tmp/.ai-rules/setup.sh" --platforms claude --force 2>&1)
          echo "$out" | grep -q "not a regular file"
          # Directory was never clobbered
          [[ -d CLAUDE.md ]]

      # install.sh resolves HOST/OWNER/REPO_NAME at the top of the file,
      # before any preflight or network call. Each test below sets up a
      # repo that triggers the "uncommitted changes" preflight to exit
      # install.sh quickly — the bash -x trace captures the resolved
      # variables before that exit, which is all these tests assert on.
      - name: install.sh smoke test (subtree install falls back to defaults)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cd "$tmp"
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          git remote add origin https://github.com/some-consumer/some-app.git
          # Tracked-then-modified file → install.sh exits at preflight
          echo a > tracked.txt
          git add tracked.txt
          git commit -q -m init
          echo b >> tracked.txt
          # Subtree-style layout
          mkdir -p .ai-rules
          cp install.sh .ai-rules/install.sh 2>/dev/null || cp "$GITHUB_WORKSPACE/install.sh" .ai-rules/install.sh
          chmod +x .ai-rules/install.sh
          touch .ai-rules/setup.sh .ai-rules/AGENTS.md
          trace=$(bash -x ./.ai-rules/install.sh 2>&1 | grep -E "^\+ (HOST|OWNER|REPO_NAME)=" || true)
          echo "$trace"
          final_owner=$(echo "$trace" | grep "^\+ OWNER=" | tail -1)
          final_repo=$(echo "$trace" | grep "^\+ REPO_NAME=" | tail -1)
          [[ "$final_owner" == *"OWNER=JonathanPorta"* ]] || { echo "FAIL: subtree leaked owner: $final_owner"; exit 1; }
          [[ "$final_repo" == *"REPO_NAME=ai-rules"* ]] || { echo "FAIL: subtree leaked repo: $final_repo"; exit 1; }

      - name: install.sh smoke test (direct clone auto-detects fork identity)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          # Fake fork at $tmp/fork
          cp -R . "$tmp/fork"
          cd "$tmp/fork"
          rm -rf .git
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          git remote add origin https://github.com/alice/ai-rules-fork.git
          git add . >/dev/null
          git commit -q -m init
          # Run install.sh from a separate dirty consumer
          mkdir -p "$tmp/consumer" && cd "$tmp/consumer"
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          echo a > tracked.txt
          git add tracked.txt
          git commit -q -m init
          echo b >> tracked.txt
          trace=$(bash -x "$tmp/fork/install.sh" 2>&1 | grep -E "^\+ (HOST|OWNER|REPO_NAME)=" || true)
          echo "$trace"
          final_owner=$(echo "$trace" | grep "^\+ OWNER=" | tail -1)
          final_repo=$(echo "$trace" | grep "^\+ REPO_NAME=" | tail -1)
          [[ "$final_owner" == *"OWNER=alice"* ]] || { echo "FAIL: direct-clone did not auto-detect: $final_owner"; exit 1; }
          [[ "$final_repo" == *"REPO_NAME=ai-rules-fork"* ]] || { echo "FAIL: direct-clone repo wrong: $final_repo"; exit 1; }

      - name: install.sh smoke test (SSH alias falls back to defaults)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cp -R . "$tmp/fork"
          cd "$tmp/fork"
          rm -rf .git
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          # SSH alias-style remote (host without a dot)
          git remote add origin git@gh-alt:foo/bar.git
          git add . >/dev/null
          git commit -q -m init
          mkdir -p "$tmp/consumer" && cd "$tmp/consumer"
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          echo a > tracked.txt
          git add tracked.txt
          git commit -q -m init
          echo b >> tracked.txt
          trace=$(bash -x "$tmp/fork/install.sh" 2>&1 | grep -E "^\+ OWNER=" || true)
          echo "$trace"
          final_owner=$(echo "$trace" | grep "^\+ OWNER=" | tail -1)
          [[ "$final_owner" == *"OWNER=JonathanPorta"* ]] || { echo "FAIL: SSH alias leaked: $final_owner"; exit 1; }

      - name: setup.sh smoke test (--check help/list interactions)
        run: |
          set -euo pipefail
          # --check --help: help wins (check does not run)
          out=$(./setup.sh --check --help)
          echo "$out" | grep -q "Usage:"
          echo "$out" | grep -q "Checking platform stubs" && { echo "FAIL: check ran under --help"; exit 1; } || true
          # --check --list: list wins
          out=$(./setup.sh --check --list)
          echo "$out" | grep -q "Supported platforms:"
          echo "$out" | grep -q "Checking platform stubs" && { echo "FAIL: check ran under --list"; exit 1; } || true

      - name: setup.sh smoke test (--check classifies all stub states, read-only)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          ST="$tmp/.ai-rules/templates/platform-stubs"
          # claude: byte-equal to template → matches
          cp "$ST/claude.md" CLAUDE.md
          # copilot: byte-equal → matches
          mkdir -p .github && cp "$ST/copilot.md" .github/copilot-instructions.md
          # cursor: template + extra below the marker → EXTENDED
          mkdir -p .cursor/rules && { cat "$ST/cursor.mdc"; echo "project-specific extra rule"; } > .cursor/rules/ai-rules.mdc
          # amp: a template line edited above the marker → MODIFIED
          sed 's/AI Development Rules/EDITED HEADING/' "$ST/amp.md" > AGENTS.md
          # windsurf: missing (not created)

          # Snapshot the consumer tree (excluding .ai-rules) to prove read-only.
          snap() { find . -path ./.ai-rules -prune -o -type f -print0 | sort -z | xargs -0 sha1sum; }
          before="$(snap)"

          out=$("$tmp/.ai-rules/setup.sh" --check)
          echo "$out"
          echo "$out" | grep -q "Checking platform stubs against ai-rules"
          echo "$out" | grep -qE "claude .*matches template"
          echo "$out" | grep -qE "copilot .*matches template"
          echo "$out" | grep -qE "cursor .*EXTENDED"
          echo "$out" | grep -qE "amp .*MODIFIED"
          echo "$out" | grep -qE "windsurf .*missing"
          echo "$out" | grep -q "Summary: 5 checked, 2 in sync, 1 extended, 1 modified, 1 missing, 0 not-ours."

          # Exit 0 despite drift
          "$tmp/.ai-rules/setup.sh" --check >/dev/null

          after="$(snap)"
          [[ "$before" == "$after" ]] || { echo "FAIL: --check mutated the tree"; exit 1; }

      - name: setup.sh smoke test (--check NOT OURS and subset filtering)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          ST="$tmp/.ai-rules/templates/platform-stubs"
          # A user file at CLAUDE.md without the reference marker → NOT OURS
          echo "my own notes, not an ai-rules stub" > CLAUDE.md
          mkdir -p .cursor/rules && { cat "$ST/cursor.mdc"; echo extra; } > .cursor/rules/ai-rules.mdc

          # No --platforms → checks ALL five (divergence from claude,copilot default)
          out=$("$tmp/.ai-rules/setup.sh" --check)
          for p in claude copilot cursor windsurf amp; do
            echo "$out" | grep -q "$p" || { echo "FAIL: --check omitted $p"; exit 1; }
          done
          echo "$out" | grep -qE "claude .*NOT OURS"

          # Subset: --check --platforms cursor checks ONLY cursor
          out=$("$tmp/.ai-rules/setup.sh" --check --platforms cursor)
          echo "$out" | grep -qE "cursor .*EXTENDED"
          for p in claude copilot windsurf amp; do
            echo "$out" | grep -qE "^  $p " && { echo "FAIL: subset leaked $p"; exit 1; } || true
          done
          echo "$out" | grep -q "Summary: 1 checked,"

      - name: setup.sh smoke test (--check internal error on missing template)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          # Remove a template that ships with the install → internal error, non-zero exit
          rm "$tmp/.ai-rules/templates/platform-stubs/claude.md"
          if "$tmp/.ai-rules/setup.sh" --check --platforms claude >/dev/null 2>&1; then
            echo "FAIL: missing template should exit non-zero"; exit 1
          fi
          # Capture first, then grep — piping a non-zero command into `grep -q`
          # would fail the step under `set -o pipefail` even on a match.
          err_out=$("$tmp/.ai-rules/setup.sh" --check --platforms claude 2>&1 || true)
          echo "$err_out" | grep -q "template missing from install"

      - name: setup.sh smoke test (--check internal error on unreadable stub)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'chmod -R u+rwX "$tmp" 2>/dev/null || true; rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          # A regular stub we cannot read is an internal error, NOT a NOT OURS
          # finding — the checker must not guess at content it can't read.
          cp "$tmp/.ai-rules/templates/platform-stubs/claude.md" CLAUDE.md
          chmod 000 CLAUDE.md
          if "$tmp/.ai-rules/setup.sh" --check --platforms claude >/dev/null 2>&1; then
            echo "FAIL: unreadable stub should exit non-zero"; exit 1
          fi
          err_out=$("$tmp/.ai-rules/setup.sh" --check --platforms claude 2>&1 || true)
          echo "$err_out" | grep -q "stub not readable"
