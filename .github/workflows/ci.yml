name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shell-and-unicode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check (every .sh file)
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            if ! bash -n "$f"; then
              echo "syntax error: $f"
              fail=1
            fi
          done < <(find . -path ./.git -prune -o -type f -name '*.sh' -print0)
          exit "$fail"

      - name: ShellCheck
        # Pinned to the v2.0.0 release SHA. This repo's whole point is
        # making AI-assisted dev safer; mutable @master refs are exactly
        # the supply-chain shape we don't want here.
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        with:
          severity: warning
          scandir: '.'
          ignore_paths: .git

      - name: Hidden Unicode scan
        run: python3 scripts/check-hidden-unicode.py

      - name: claim-fork.sh smoke test (--help)
        run: ./claim-fork.sh --help

      - name: claim-fork.sh smoke test (--dry-run on simulated fork)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          # Mirror the repo into a tmp dir, retarget origin to a fake fork,
          # and confirm claim-fork.sh detects it and previews cleanly.
          cp -R . "$tmp/repo"
          cd "$tmp/repo"
          rm -rf .git
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          git remote add origin https://github.com/ci-fork-test/ai-rules-fork.git
          git add . >/dev/null
          git commit -q -m "init"
          # Accept all parsed defaults via empty newlines; --dry-run exits
          # before any mutation, so this should always succeed.
          printf '\n\n\n' | ./claim-fork.sh --dry-run

      - name: setup.sh smoke test (--help, --list)
        run: |
          set -euo pipefail
          # Capture output first, then grep — avoids SIGPIPE on setup.sh's
          # printf loop when `grep -q` exits early on the first match
          # (combined with pipefail, that would propagate non-zero).
          help_out=$(./setup.sh --help)
          echo "$help_out" | grep -q "Usage:"
          echo "$help_out" | grep -q -- "--force"
          echo "$help_out" | grep -q -- "--no-skills"
          echo "$help_out" | grep -qE "Defaults to:.*claude,copilot"
          list_out=$(./setup.sh --list)
          echo "$list_out" | grep -q "claude"
          echo "$list_out" | grep -q "copilot"
          echo "$list_out" | grep -q "cursor"
          # Skill-wiring annotation per platform
          echo "$list_out" | grep -q "skills: native at .claude/skills/"
          echo "$list_out" | grep -q "skills: native at .windsurf/skills/"
          echo "$list_out" | grep -q "skills: native at .github/skills/"
          echo "$list_out" | grep -q "skills: reference only"

      - name: setup.sh smoke test (no-args defaults to claude,copilot)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          out=$("$tmp/.ai-rules/setup.sh" --dry-run 2>&1)
          echo "$out" | grep -q "defaulting to: claude,copilot"
          echo "$out" | grep -q "would create CLAUDE.md"
          echo "$out" | grep -q "would create .github/copilot-instructions.md"
          # Dry-run must not have created either file
          [[ ! -e "$tmp/CLAUDE.md" ]]
          [[ ! -e "$tmp/.github/copilot-instructions.md" ]]

      - name: setup.sh smoke test (--force overwrites existing stub)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          mkdir -p .cursor/rules
          {
            echo '<!-- ai-rules-reference -->'
            echo 'do not overwrite without --force'
          } > .cursor/rules/ai-rules.mdc
          # Without --force: skip existing
          out=$("$tmp/.ai-rules/setup.sh" --platforms cursor 2>&1)
          echo "$out" | grep -q "already has ai-rules reference"
          grep -q "do not overwrite without --force" .cursor/rules/ai-rules.mdc
          # With --force: overwrite with template
          "$tmp/.ai-rules/setup.sh" --platforms cursor --force >/dev/null
          grep -q "alwaysApply: true" .cursor/rules/ai-rules.mdc

      - name: setup.sh smoke test (--force --dry-run does not write)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          mkdir -p .cursor/rules
          echo "manual content do not touch" > .cursor/rules/ai-rules.mdc
          out=$("$tmp/.ai-rules/setup.sh" --platforms cursor --force --dry-run 2>&1)
          echo "$out" | grep -q "would overwrite"
          # File unchanged
          grep -q "manual content do not touch" .cursor/rules/ai-rules.mdc

      - name: setup.sh smoke test (non-regular target file is guarded)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          # Target is a directory, not a regular file
          mkdir CLAUDE.md
          out=$("$tmp/.ai-rules/setup.sh" --platforms claude 2>&1)
          echo "$out" | grep -q "not a regular file"
          # Even with --force, the guard must hold
          out=$("$tmp/.ai-rules/setup.sh" --platforms claude --force 2>&1)
          echo "$out" | grep -q "not a regular file"
          # Directory was never clobbered
          [[ -d CLAUDE.md ]]

      - name: setup.sh smoke test (native-skills wiring creates symlinks)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          "$tmp/.ai-rules/setup.sh" --platforms all >/dev/null
          # Three native-skills platforms get a relative symlink per skill
          for target in .claude/skills/prd-authoring \
                        .windsurf/skills/prd-authoring \
                        .github/skills/prd-authoring; do
            [[ -L "$target" ]] || { echo "FAIL: $target is not a symlink"; exit 1; }
            link="$(readlink "$target")"
            [[ "$link" == "../../.ai-rules/skills/prd-authoring" ]] || \
              { echo "FAIL: $target -> $link (expected ../../.ai-rules/skills/prd-authoring)"; exit 1; }
            # And resolves to a real directory containing SKILL.md
            [[ -f "$target/SKILL.md" ]] || { echo "FAIL: $target/SKILL.md not resolvable"; exit 1; }
          done
          # Reference-only platforms get no symlinks; their stubs carry the reference text
          [[ ! -e .cursor/skills ]] || { echo "FAIL: cursor got a skills directory"; exit 1; }
          grep -qF ".ai-rules/skills/" .cursor/rules/ai-rules.mdc
          grep -qF ".ai-rules/skills/" AGENTS.md

      - name: setup.sh smoke test (--no-skills suppresses wiring)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          "$tmp/.ai-rules/setup.sh" --platforms claude --no-skills >/dev/null
          # Stub still created
          [[ -f CLAUDE.md ]] || { echo "FAIL: CLAUDE.md not created"; exit 1; }
          # No skills directory created
          [[ ! -e .claude/skills ]] || { echo "FAIL: --no-skills did not suppress wiring"; exit 1; }

      - name: setup.sh smoke test (skills wiring is idempotent)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          "$tmp/.ai-rules/setup.sh" --platforms claude >/dev/null
          out=$("$tmp/.ai-rules/setup.sh" --platforms claude 2>&1)
          echo "$out" | grep -q "symlink already correct"
          # Symlink unchanged
          [[ -L .claude/skills/prd-authoring ]]
          link="$(readlink .claude/skills/prd-authoring)"
          [[ "$link" == "../../.ai-rules/skills/prd-authoring" ]]

      - name: setup.sh smoke test (skills --dry-run does not write)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          out=$("$tmp/.ai-rules/setup.sh" --platforms claude --dry-run 2>&1)
          echo "$out" | grep -q "would link .claude/skills/prd-authoring"
          # Nothing on disk
          [[ ! -e .claude/skills ]] || { echo "FAIL: dry-run created skills dir"; exit 1; }
          [[ ! -e CLAUDE.md ]] || { echo "FAIL: dry-run created stub"; exit 1; }

      - name: setup.sh smoke test (foreign content at skill target is guarded)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/.ai-rules"
          cp -R . "$tmp/.ai-rules/"
          cd "$tmp"
          # Pre-populate a real directory at the skill target — user content
          mkdir -p .claude/skills/prd-authoring
          echo "user notes" > .claude/skills/prd-authoring/notes.md
          # Without --force: warn, leave it alone
          out=$("$tmp/.ai-rules/setup.sh" --platforms claude 2>&1)
          echo "$out" | grep -q "non-symlink path exists; use --force to replace"
          [[ -d .claude/skills/prd-authoring && ! -L .claude/skills/prd-authoring ]] || \
            { echo "FAIL: directory was clobbered without --force"; exit 1; }
          [[ -f .claude/skills/prd-authoring/notes.md ]] || \
            { echo "FAIL: user content was lost"; exit 1; }
          # With --force: replace with the symlink
          "$tmp/.ai-rules/setup.sh" --platforms claude --force >/dev/null
          [[ -L .claude/skills/prd-authoring ]] || { echo "FAIL: --force did not convert to symlink"; exit 1; }
          link="$(readlink .claude/skills/prd-authoring)"
          [[ "$link" == "../../.ai-rules/skills/prd-authoring" ]]

      # install.sh resolves HOST/OWNER/REPO_NAME at the top of the file,
      # before any preflight or network call. Each test below sets up a
      # repo that triggers the "uncommitted changes" preflight to exit
      # install.sh quickly — the bash -x trace captures the resolved
      # variables before that exit, which is all these tests assert on.
      - name: install.sh smoke test (subtree install falls back to defaults)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cd "$tmp"
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          git remote add origin https://github.com/some-consumer/some-app.git
          # Tracked-then-modified file → install.sh exits at preflight
          echo a > tracked.txt
          git add tracked.txt
          git commit -q -m init
          echo b >> tracked.txt
          # Subtree-style layout
          mkdir -p .ai-rules
          cp install.sh .ai-rules/install.sh 2>/dev/null || cp "$GITHUB_WORKSPACE/install.sh" .ai-rules/install.sh
          chmod +x .ai-rules/install.sh
          touch .ai-rules/setup.sh .ai-rules/AGENTS.md
          trace=$(bash -x ./.ai-rules/install.sh 2>&1 | grep -E "^\+ (HOST|OWNER|REPO_NAME)=" || true)
          echo "$trace"
          final_owner=$(echo "$trace" | grep "^\+ OWNER=" | tail -1)
          final_repo=$(echo "$trace" | grep "^\+ REPO_NAME=" | tail -1)
          [[ "$final_owner" == *"OWNER=JonathanPorta"* ]] || { echo "FAIL: subtree leaked owner: $final_owner"; exit 1; }
          [[ "$final_repo" == *"REPO_NAME=ai-rules"* ]] || { echo "FAIL: subtree leaked repo: $final_repo"; exit 1; }

      - name: install.sh smoke test (direct clone auto-detects fork identity)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          # Fake fork at $tmp/fork
          cp -R . "$tmp/fork"
          cd "$tmp/fork"
          rm -rf .git
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          git remote add origin https://github.com/alice/ai-rules-fork.git
          git add . >/dev/null
          git commit -q -m init
          # Run install.sh from a separate dirty consumer
          mkdir -p "$tmp/consumer" && cd "$tmp/consumer"
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          echo a > tracked.txt
          git add tracked.txt
          git commit -q -m init
          echo b >> tracked.txt
          trace=$(bash -x "$tmp/fork/install.sh" 2>&1 | grep -E "^\+ (HOST|OWNER|REPO_NAME)=" || true)
          echo "$trace"
          final_owner=$(echo "$trace" | grep "^\+ OWNER=" | tail -1)
          final_repo=$(echo "$trace" | grep "^\+ REPO_NAME=" | tail -1)
          [[ "$final_owner" == *"OWNER=alice"* ]] || { echo "FAIL: direct-clone did not auto-detect: $final_owner"; exit 1; }
          [[ "$final_repo" == *"REPO_NAME=ai-rules-fork"* ]] || { echo "FAIL: direct-clone repo wrong: $final_repo"; exit 1; }

      - name: install.sh smoke test (SSH alias falls back to defaults)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cp -R . "$tmp/fork"
          cd "$tmp/fork"
          rm -rf .git
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          # SSH alias-style remote (host without a dot)
          git remote add origin git@gh-alt:foo/bar.git
          git add . >/dev/null
          git commit -q -m init
          mkdir -p "$tmp/consumer" && cd "$tmp/consumer"
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          echo a > tracked.txt
          git add tracked.txt
          git commit -q -m init
          echo b >> tracked.txt
          trace=$(bash -x "$tmp/fork/install.sh" 2>&1 | grep -E "^\+ OWNER=" || true)
          echo "$trace"
          final_owner=$(echo "$trace" | grep "^\+ OWNER=" | tail -1)
          [[ "$final_owner" == *"OWNER=JonathanPorta"* ]] || { echo "FAIL: SSH alias leaked: $final_owner"; exit 1; }
